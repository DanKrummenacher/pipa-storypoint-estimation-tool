<h2>Raum erstellen</h2>

<input [(ngModel)]="roomName" placeholder="Raumname" />
<input [(ngModel)]="userName" placeholder="Dein Name" />
<button (click)="createRoom()">Erstellen</button>

<hr />

<h2>Raum beitreten</h2>

<input [(ngModel)]="joinRoomCode" placeholder="Raum Code" />
<input [(ngModel)]="userName" placeholder="Dein Name" />
<button (click)="joinRoom()">Beitreten</button>
