name: Quality & Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Frontend
        run: npm ci
        working-directory: ./frontend

      - name: Lint & Format Frontend
        id: lint_frontend
        continue-on-error: true
        run: |
          npm run format:check
          npm run lint
        working-directory: ./frontend

      - name: Build Frontend
        id: build_frontend
        continue-on-error: true
        run: npm run build
        working-directory: ./frontend

      - name: Install Backend
        run: npm ci
        working-directory: ./backend

      - name: Lint & Format Backend
        id: lint_backend
        continue-on-error: true
        run: |
          npm run format:check
          npm run lint
        working-directory: ./backend

      - name: Build Backend
        id: build_backend
        continue-on-error: true
        run: npm run build
        working-directory: ./backend

      - name: Check for failures
        if: |
          steps.lint_frontend.outcome == 'failure' ||
          steps.build_frontend.outcome == 'failure' ||
          steps.lint_backend.outcome == 'failure' ||
          steps.build_backend.outcome == 'failure'
        run: |
          echo "CI failed because one or more steps had errors."
          exit 1